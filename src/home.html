<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travel Explorer - Discover Hotels</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background-color: #f7f7f7;
            color: #333;
        }

        header {
            background-color: #fff;
            border-bottom: 1px solid #e0e0e0;
            padding: 20px 0;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        }

        .header-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            color: #FF5A5F;
            text-decoration: none;
        }

        .user-menu {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        button.logout-btn {
            background-color: #FF5A5F;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: background-color 0.2s;
        }

        button.logout-btn:hover {
            background-color: #E74C52;
        }

        .search-section {
            max-width: 1200px;
            margin: 40px auto 0;
            padding: 0 20px;
        }

        .search-bar-container {
            display: flex;
            gap: 10px;
            margin-bottom: 50px;
        }

        input.search-bar {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.2s;
        }

        input.search-bar:focus {
            outline: none;
            border-color: #FF5A5F;
            box-shadow: 0 0 0 3px rgba(255, 90, 95, 0.1);
        }

        button.search-btn {
            background-color: #FF5A5F;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: background-color 0.2s;
        }

        button.search-btn:hover {
            background-color: #E74C52;
        }

        .main-content {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px 40px;
        }

        .section-title {
            font-size: 28px;
            font-weight: bold;
            margin: 50px 0 25px;
            color: #222;
        }

        .hotels-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
            margin-bottom: 50px;
        }

        .hotel-card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .hotel-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
        }

        .hotel-image {
            width: 100%;
            height: 200px;
            object-fit: cover;
            background-color: #e0e0e0;
        }

        .hotel-info {
            padding: 15px;
        }

        .hotel-name {
            font-size: 16px;
            font-weight: 600;
            color: #222;
            margin-bottom: 8px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .hotel-location {
            font-size: 13px;
            color: #666;
            margin-bottom: 10px;
        }

        .hotel-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .hotel-price {
            font-size: 16px;
            font-weight: bold;
            color: #222;
        }

        .hotel-price-label {
            font-size: 12px;
            color: #999;
            display: block;
        }

        .hotel-rating {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 13px;
            color: #666;
        }

        .star {
            color: #FF5A5F;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #999;
        }

        @media (max-width: 768px) {
            .hotels-grid {
                grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
                gap: 15px;
            }

            .section-title {
                font-size: 20px;
                margin: 30px 0 15px;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="header-container">
            <a href="home.html" class="logo">✈️ Travel Explorer</a>
            <div class="user-menu">
                <span id="userEmail" style="color: #666; font-size: 14px;"></span>
                <button class="logout-btn" onclick="logout()">Logout</button>
            </div>
        </div>
    </header>

    <div class="search-section">
        <div class="search-bar-container">
            <input type="text" id="searchInput" class="search-bar" placeholder="Search hotels by name, city, or country..." />
            <button class="search-btn" onclick="performSearch()">Search</button>
        </div>
    </div>

    <div class="main-content">
        <div class="section-title">Recently Listed Hotels</div>
        <div class="hotels-grid" id="recentHotels">
            <div class="loading">Loading hotels...</div>
        </div>

        <div class="section-title">Hotels in Mumbai</div>
        <div class="hotels-grid" id="mumbaiHotels">
            <div class="loading">Loading hotels...</div>
        </div>
    </div>

    <script>
        // Prefer same-origin on port 3000; otherwise fallback to backend:8000
        (function(){
            const origin = window.location.origin || '';
            if (!window.__API_BASE__) {
                if (origin.includes(':3000') || origin.includes(':8000')) {
                    window.__API_BASE__ = '';
                } else {
                    window.__API_BASE__ = 'http://localhost:8000';
                }
            }
        })();
    </script>
    <script type="module">
        import { getRecentHotels, getHotelsByCity } from './services/api.js';
        document.addEventListener('DOMContentLoaded', function() {
            // Check if user is logged in
            const userEmail = localStorage.getItem('userEmail');
            if (!userEmail) {
                window.location.href = 'signup.html';
                return;
            }

            document.getElementById('userEmail').textContent = userEmail;

            // Load sections
            loadRecentHotels();
            loadMumbaiHotels();

            // Search on Enter key
            document.getElementById('searchInput').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    performSearch();
                }
            });
        });

        async function loadRecentHotels() {
            const container = document.getElementById('recentHotels');
            container.innerHTML = '<div class="loading">Loading hotels...</div>';
            try {
                const hotels = await getRecentHotels();
                renderHotels('recentHotels', hotels);
            } catch (error) {
                console.error('Error loading recent hotels:', error);
                container.innerHTML = '<div class="loading">Failed to load hotels</div>';
            }
        }

        async function loadMumbaiHotels() {
            const container = document.getElementById('mumbaiHotels');
            container.innerHTML = '<div class="loading">Loading hotels...</div>';
            try {
                const hotels = await getHotelsByCity('Mumbai');
                renderHotels('mumbaiHotels', hotels);
            } catch (error) {
                console.error('Error loading Mumbai hotels:', error);
                container.innerHTML = '<div class="loading">Failed to load hotels</div>';
            }
        }

        function renderHotels(containerId, hotels) {
            const container = document.getElementById(containerId);
            
            if (hotels.length === 0) {
                container.innerHTML = '<div class="loading">No hotels found</div>';
                return;
            }

            container.innerHTML = hotels.map(hotel => `
                <div class="hotel-card" onclick="viewHotelDetails(${hotel.id})">
                    <img src="${hotel.image_url || 'https://via.placeholder.com/400x300?text=Hotel'}" alt="${hotel.name}" class="hotel-image" />
                    <div class="hotel-info">
                        <div class="hotel-name">${hotel.name}</div>
                        <div class="hotel-location">${hotel.city}, ${hotel.country}</div>
                        <div class="hotel-footer">
                            <div>
                                <span class="hotel-price-label">per night</span>
                                <span class="hotel-price">₹${(Math.round(hotel.price)).toLocaleString('en-IN')}</span>
                            </div>
                            <div class="hotel-rating">
                                <span class="star">★</span>
                                <span>${hotel.rating.toFixed(2)}</span>
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function performSearch() {
            const query = document.getElementById('searchInput').value.trim();
            if (query.length < 2) {
                alert('Please enter at least 2 characters to search');
                return;
            }

            // Navigate to search results page
            window.location.href = `search.html?q=${encodeURIComponent(query)}`;
        }

        function viewHotelDetails(hotelId) {
            window.location.href = `hotel-details.html?id=${hotelId}`;
        }

        function logout() {
            localStorage.removeItem('userEmail');
            window.location.href = 'signup.html';
        }

        // Expose functions to global scope for onclick handlers
        window.performSearch = performSearch;
        window.viewHotelDetails = viewHotelDetails;
        window.logout = logout;
    </script>
</body>
</html>
