<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heavenly – Discover Hotels</title>
    <link rel="icon" href="http://localhost:8000/uploads/logo/heavenly_logo_png.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background-color: #f7f7f7;
            color: #333;
        }

        header {
            background-color: #fff;
            border-bottom: 1px solid #e0e0e0;
            padding: 20px 0;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        }

        .header-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            color: #FF5A5F;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logo img {
            height: 40px;
            width: auto;
            display: block;
            object-fit: contain;
        }

        .user-menu {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        button.logout-btn,
        button.profile-btn {
            background-color: #FF5A5F;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s ease;
            box-shadow: 0 2px 4px rgba(255, 90, 95, 0.2);
        }

        button.logout-btn:hover,
        button.profile-btn:hover {
            background-color: #E74C52;
            transform: translateY(-1px);
            box-shadow: 0 4px 8px rgba(255, 90, 95, 0.3);
        }

        button.logout-btn:active,
        button.profile-btn:active {
            transform: translateY(0);
            box-shadow: 0 1px 2px rgba(255, 90, 95, 0.2);
        }

        button.logout-btn:focus,
        button.profile-btn:focus {
            outline: 2px solid #FF5A5F;
            outline-offset: 2px;
        }

        button.logout-btn:disabled,
        button.profile-btn:disabled {
            background-color: #ccc;
            cursor: not-allowed;
            opacity: 0.6;
            box-shadow: none;
        }

        .search-section {
            max-width: 1200px;
            margin: 40px auto 0;
            padding: 0 20px;
        }

        .search-bar-container {
            display: flex;
            gap: 10px;
            margin-bottom: 50px;
        }

        input.search-bar {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.2s;
        }

        input.search-bar:focus {
            outline: none;
            border-color: #FF5A5F;
            box-shadow: 0 0 0 3px rgba(255, 90, 95, 0.1);
        }

        button.search-btn {
            background-color: #FF5A5F;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: background-color 0.2s;
        }

        button.search-btn:hover {
            background-color: #E74C52;
        }

        .main-content {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px 40px;
        }

        .section-title {
            font-size: 28px;
            font-weight: bold;
            margin: 50px 0 25px;
            color: #222;
        }

        .hotels-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
            margin-bottom: 50px;
        }

        .hotel-card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .hotel-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
        }

        .hotel-image {
            width: 100%;
            height: 200px;
            object-fit: cover;
            background-color: #e0e0e0;
        }

        .hotel-info {
            padding: 15px;
        }

        .hotel-name {
            font-size: 16px;
            font-weight: 600;
            color: #222;
            margin-bottom: 8px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .hotel-location {
            font-size: 13px;
            color: #666;
            margin-bottom: 10px;
        }

        .hotel-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .hotel-price {
            font-size: 16px;
            font-weight: bold;
            color: #222;
        }

        .hotel-price-label {
            font-size: 12px;
            color: #999;
            display: block;
        }

        .hotel-rating {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 13px;
            color: #666;
        }

        .star {
            color: #FF5A5F;
        }

        .loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
            text-align: center;
            padding: 40px;
            color: #999;
        }

        .loading-logo {
            height: 48px;
            width: auto;
            object-fit: contain;
            animation: fadeIn 0.3s ease-in;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        @media (max-width: 768px) {
            .hotels-grid {
                grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
                gap: 15px;
            }

            .section-title {
                font-size: 20px;
                margin: 30px 0 15px;
            }

            .header-container {
                flex-wrap: wrap;
                gap: 10px;
            }

            .user-menu {
                flex-wrap: wrap;
                gap: 8px;
                width: 100%;
                justify-content: flex-end;
            }

            button.logout-btn,
            button.profile-btn {
                padding: 8px 14px;
                font-size: 13px;
            }

            #userEmail {
                width: 100%;
                order: -1;
            }
        }

        @media (max-width: 480px) {
            button.logout-btn,
            button.profile-btn {
                flex: 1;
                min-width: 100px;
            }

            .user-menu {
                justify-content: stretch;
            }
        }

        /* Logout Confirmation Modal */
        .logout-modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(0, 0, 0, 0.5);
            z-index: 10000;
            animation: fadeIn 0.2s ease;
        }

        .logout-modal-overlay.show {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logout-modal {
            background: white;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            padding: 28px;
            max-width: 400px;
            width: 90%;
            animation: slideUp 0.3s ease;
        }

        .logout-modal-title {
            font-size: 20px;
            font-weight: 600;
            color: #333;
            margin-bottom: 16px;
        }

        .logout-modal-buttons {
            display: flex;
            gap: 12px;
            margin-top: 24px;
        }

        .logout-modal-btn {
            flex: 1;
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .logout-modal-btn-cancel {
            background-color: #f0f0f0;
            color: #333;
        }

        .logout-modal-btn-cancel:hover {
            background-color: #e0e0e0;
        }

        .logout-modal-btn-logout {
            background-color: #d90429;
            color: white;
        }

        .logout-modal-btn-logout:hover {
            background-color: #b50321;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Coming Soon Modal (Host Onboarding) */
        .coming-soon-modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            animation: fadeIn 0.3s ease;
        }

        .coming-soon-modal-overlay.show {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .coming-soon-modal {
            background: white;
            border-radius: 12px;
            padding: 32px;
            max-width: 420px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.15);
            text-align: center;
            animation: slideUp 0.3s ease;
        }

        .coming-soon-modal-icon {
            font-size: 48px;
            margin-bottom: 16px;
            display: block;
        }

        .coming-soon-modal-title {
            font-size: 20px;
            font-weight: 700;
            color: #222;
            margin-bottom: 12px;
        }

        .coming-soon-modal-message {
            font-size: 14px;
            color: #666;
            line-height: 1.6;
            margin-bottom: 24px;
        }

        .coming-soon-modal-close {
            background: #FF5A5F;
            color: white;
            border: none;
            padding: 12px 32px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .coming-soon-modal-close:hover {
            background: #E74C52;
            transform: translateY(-1px);
        }

        .coming-soon-modal-close:active {
            transform: translateY(0);
        }
    </style>
</head>
<body>
    <header>
        <div class="header-container">
            <a href="home.html" class="logo"><img src="http://localhost:8000/uploads/logo/heavenly_logo_png.png" alt="Heavenly logo"> Heavenly</a>
            <div class="user-menu">
                <span id="userEmail" style="color: #666; font-size: 14px;"></span>
                <button class="profile-btn" onclick="window.location.href='profile.html'" aria-label="View your profile">My Profile</button>
                <button class="profile-btn" id="headerBecomeHostBtn" aria-label="Become a Host - Coming Soon">Become a Host</button>
                <button class="logout-btn" onclick="logout()" aria-label="Logout">Logout</button>
            </div>
        </div>
    </header>

    <!-- Logout Confirmation Modal -->
    <div class="logout-modal-overlay" id="logoutModal" role="dialog" aria-modal="true" aria-labelledby="logoutModalTitle">
        <div class="logout-modal">
            <h2 class="logout-modal-title" id="logoutModalTitle">Are you sure you want to logout?</h2>
            <div class="logout-modal-buttons">
                <button class="logout-modal-btn logout-modal-btn-cancel" id="logoutCancelBtn">Cancel</button>
                <button class="logout-modal-btn logout-modal-btn-logout" id="logoutConfirmBtn">Logout</button>
            </div>
        </div>
    </div>

    <!-- Coming Soon Modal - Host Onboarding -->
    <div class="coming-soon-modal-overlay" id="comingSoonModal" role="dialog" aria-modal="true" aria-labelledby="comingSoonTitle">
        <div class="coming-soon-modal">
            <span class="coming-soon-modal-icon" aria-hidden="true">🏠</span>
            <h2 class="coming-soon-modal-title" id="comingSoonTitle">Become a Host – Coming Soon</h2>
            <p class="coming-soon-modal-message">
                Host onboarding will be unlocked in Version 2.
                <br>
                We're building tools to help you list, manage, and track your properties.
            </p>
            <button class="coming-soon-modal-close" id="comingSoonCloseBtn">Got it, thanks!</button>
        </div>
    </div>

    <div class="search-section">
        <div class="search-bar-container">
            <input type="text" id="searchInput" class="search-bar" placeholder="Search hotels by name, city, or country..." />
            <button class="search-btn" onclick="performSearch()">Search</button>
        </div>
    </div>

    <div class="main-content">
        <div class="section-title">Recently Listed Hotels</div>
        <div class="hotels-grid" id="recentHotels">
            <div class="loading">
                <img src="http://localhost:8000/uploads/logo/heavenly_logo_png.png" alt="Heavenly logo" class="loading-logo">
                <div>Loading hotels...</div>
            </div>
        </div>

        <div class="section-title">Hotels in Mumbai</div>
        <div class="hotels-grid" id="mumbaiHotels">
            <div class="loading">
                <img src="http://localhost:8000/uploads/logo/heavenly_logo_png.png" alt="Heavenly logo" class="loading-logo">
                <div>Loading hotels...</div>
            </div>
        </div>
    </div>

    <script>
        // Prefer same-origin on port 3000; otherwise fallback to backend:8000
        (function(){
            const origin = window.location.origin || '';
            if (!window.__API_BASE__) {
                if (origin.includes(':3000') || origin.includes(':8000')) {
                    window.__API_BASE__ = '';
                } else {
                    window.__API_BASE__ = 'http://localhost:8000';
                }
            }
        })();
    </script>
    <script type="module">
        import { getRecentHotels, getHotelsByCity } from './services/api.js';

        // Helper function to generate branded loading HTML
        function createLoadingHTML(message = 'Loading...') {
            return `<div class="loading">
                <img src="http://localhost:8000/uploads/logo/heavenly_logo_png.png" alt="Heavenly logo" class="loading-logo">
                <div>${message}</div>
            </div>`;
        }

        // Initialize header "Become a Host" button handler
        function initializeHeaderBecomeHostButton() {
            const headerBtn = document.getElementById('headerBecomeHostBtn');
            if (headerBtn) {
                headerBtn.addEventListener('click', () => {
                    const modal = document.getElementById('comingSoonModal');
                    if (modal) {
                        modal.classList.add('show');
                    }
                });
            }
        }

        // Initialize on DOM ready
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initializeHeaderBecomeHostButton);
        } else {
            initializeHeaderBecomeHostButton();
        }

        // Setup coming-soon modal close handlers
        document.getElementById('comingSoonCloseBtn').addEventListener('click', () => {
            const modal = document.getElementById('comingSoonModal');
            modal.classList.remove('show');
        });

        // Close coming-soon modal when clicking the overlay
        document.getElementById('comingSoonModal').addEventListener('click', (e) => {
            if (e.target.id === 'comingSoonModal') {
                e.target.classList.remove('show');
            }
        });

        // Close coming-soon modal on Escape key
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                const modal = document.getElementById('comingSoonModal');
                if (modal.classList.contains('show')) {
                    modal.classList.remove('show');
                }
            }
        });

        document.addEventListener('DOMContentLoaded', function() {
            // Check if user is logged in
            const userEmail = localStorage.getItem('userEmail');
            if (!userEmail) {
                window.location.href = 'signup.html';
                return;
            }

            document.getElementById('userEmail').textContent = userEmail;

            // Load sections
            loadRecentHotels();
            loadMumbaiHotels();

            // Search on Enter key
            document.getElementById('searchInput').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    performSearch();
                }
            });
        });

        async function loadRecentHotels() {
            const container = document.getElementById('recentHotels');
            container.innerHTML = createLoadingHTML('Loading hotels...');
            try {
                const hotels = await getRecentHotels();
                renderHotels('recentHotels', hotels);
            } catch (error) {
                console.error('Error loading recent hotels:', error);
                container.innerHTML = createLoadingHTML('Failed to load hotels');
            }
        }

        async function loadMumbaiHotels() {
            const container = document.getElementById('mumbaiHotels');
            container.innerHTML = createLoadingHTML('Loading hotels...');
            try {
                const hotels = await getHotelsByCity('Mumbai');
                renderHotels('mumbaiHotels', hotels);
            } catch (error) {
                console.error('Error loading Mumbai hotels:', error);
                container.innerHTML = createLoadingHTML('Failed to load hotels');
            }
        }

        function renderHotels(containerId, hotels) {
            const container = document.getElementById(containerId);
            
            if (hotels.length === 0) {
                container.innerHTML = createLoadingHTML('No hotels found');
                return;
            }

            container.innerHTML = hotels.map(hotel => `
                <div class="hotel-card" onclick="viewHotelDetails(${hotel.id})">
                    <img src="${hotel.image_url || 'https://via.placeholder.com/400x300?text=Hotel'}" alt="${hotel.name}" class="hotel-image" />
                    <div class="hotel-info">
                        <div class="hotel-name">${hotel.name}</div>
                        <div class="hotel-location">${hotel.city}, ${hotel.country}</div>
                        <div class="hotel-footer">
                            <div>
                                <span class="hotel-price-label">per night</span>
                                <span class="hotel-price">₹${(Math.round(hotel.price)).toLocaleString('en-IN')}</span>
                            </div>
                            <div class="hotel-rating">
                                <span class="star">★</span>
                                <span>${hotel.rating.toFixed(2)}</span>
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function performSearch() {
            const query = document.getElementById('searchInput').value.trim();
            if (query.length < 2) {
                alert('Please enter at least 2 characters to search');
                return;
            }

            // Navigate to search results page
            window.location.href = `search.html?q=${encodeURIComponent(query)}`;
        }

        function viewHotelDetails(hotelId) {
            window.location.href = `hotel-details.html?id=${hotelId}`;
        }


        function logout() {
            // Show custom modal every time
            showLogoutModal();
        }

        function showLogoutModal() {
            const modal = document.getElementById('logoutModal');
            const cancelBtn = document.getElementById('logoutCancelBtn');
            const confirmBtn = document.getElementById('logoutConfirmBtn');
            
            // Show modal
            modal.classList.add('show');
            
            // Focus on cancel button for accessibility
            cancelBtn.focus();
            
            // Trap focus within modal
            const focusableElements = modal.querySelectorAll('button');
            const firstElement = focusableElements[0];
            const lastElement = focusableElements[focusableElements.length - 1];
            
            function trapFocus(e) {
                if (e.key === 'Tab') {
                    if (e.shiftKey) {
                        if (document.activeElement === firstElement) {
                            lastElement.focus();
                            e.preventDefault();
                        }
                    } else {
                        if (document.activeElement === lastElement) {
                            firstElement.focus();
                            e.preventDefault();
                        }
                    }
                }
                if (e.key === 'Escape') {
                    hideLogoutModal();
                }
            }
            
            modal.addEventListener('keydown', trapFocus);
            
            // Cancel button handler
            function handleCancel() {
                hideLogoutModal();
                cleanup();
            }
            
            // Confirm button handler
            function handleConfirm() {
                hideLogoutModal();
                cleanup();
                // Proceed with logout
                localStorage.removeItem('userEmail');
                window.location.href = 'signup.html';
            }
            
            // Close on overlay click
            function handleOverlayClick(e) {
                if (e.target === modal) {
                    hideLogoutModal();
                    cleanup();
                }
            }
            
            function cleanup() {
                cancelBtn.removeEventListener('click', handleCancel);
                confirmBtn.removeEventListener('click', handleConfirm);
                modal.removeEventListener('click', handleOverlayClick);
                modal.removeEventListener('keydown', trapFocus);
            }
            
            cancelBtn.addEventListener('click', handleCancel);
            confirmBtn.addEventListener('click', handleConfirm);
            modal.addEventListener('click', handleOverlayClick);
        }
        
        function hideLogoutModal() {
            const modal = document.getElementById('logoutModal');
            modal.classList.remove('show');
        }

        // Expose functions to global scope for onclick handlers
        window.performSearch = performSearch;
        window.viewHotelDetails = viewHotelDetails;
        window.logout = logout;
    </script>
</body>
</html>
