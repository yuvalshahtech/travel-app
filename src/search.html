<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Results - Travel Explorer</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: #f7f7f7;
            color: #333;
        }

        header {
            background-color: #fff;
            border-bottom: 1px solid #e0e0e0;
            padding: 15px 20px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
        }

        .logo {
            font-size: 20px;
            font-weight: bold;
            color: #FF5A5F;
            text-decoration: none;
            white-space: nowrap;
        }

        .search-bar {
            flex: 1;
            padding: 10px 14px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
        }

        .user-menu {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        button {
            background-color: #FF5A5F;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: background-color 0.2s;
        }

        button:hover {
            background-color: #E74C52;
        }

        .container {
            display: flex;
            height: calc(100vh - 70px);
            max-width: 1400px;
            margin: 0 auto;
        }

        .map-container {
            flex: 1;
            min-width: 50%;
            position: relative;
        }

        #map {
            width: 100%;
            height: 100%;
        }

        .list-container {
            flex: 0 0 400px;
            overflow-y: auto;
            background: white;
            border-left: 1px solid #e0e0e0;
        }

        .hotel-list-header {
            padding: 20px;
            border-bottom: 1px solid #e0e0e0;
            background-color: #f9f9f9;
            position: sticky;
            top: 0;
        }

        .hotel-list-header h2 {
            font-size: 16px;
            margin-bottom: 5px;
        }

        .hotel-count {
            font-size: 12px;
            color: #999;
        }

        .hotel-list-item {
            padding: 15px 20px;
            border-bottom: 1px solid #e0e0e0;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .hotel-list-item:hover {
            background-color: #f5f5f5;
        }

        .hotel-list-item.active {
            background-color: #fff5f6;
            border-left: 4px solid #FF5A5F;
            padding-left: 16px;
        }

        .list-hotel-name {
            font-size: 14px;
            font-weight: 600;
            color: #222;
            margin-bottom: 5px;
        }

        .list-hotel-location {
            font-size: 12px;
            color: #666;
            margin-bottom: 8px;
        }

        .list-hotel-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .list-hotel-price {
            font-weight: 600;
            color: #222;
            font-size: 14px;
        }

        .list-hotel-rating {
            display: flex;
            align-items: center;
            gap: 3px;
            font-size: 12px;
            color: #666;
        }

        .star {
            color: #FF5A5F;
        }

        .loading {
            text-align: center;
            padding: 40px 20px;
            color: #999;
        }

        .popup-card {
            display: block;
            width: 240px;
            background: #fff;
            border-radius: 12px;
            overflow: hidden;
            text-decoration: none;
            color: #222;
            box-shadow: 0 10px 28px rgba(0, 0, 0, 0.16);
            transition: transform 0.15s ease, box-shadow 0.15s ease;
        }

        .popup-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 32px rgba(0, 0, 0, 0.2);
        }

        .popup-card img {
            width: 100%;
            height: 150px;
            object-fit: cover;
            display: block;
            background: #eee;
        }

        .popup-card-body {
            padding: 10px 12px;
        }

        .popup-card-title {
            font-weight: 700;
            font-size: 14px;
            margin-bottom: 4px;
        }

        .popup-card-meta {
            font-size: 12px;
            color: #666;
            margin-bottom: 6px;
        }

        .popup-card-price {
            font-weight: 700;
            font-size: 14px;
            margin-bottom: 4px;
        }

        .popup-card-rating {
            font-size: 12px;
            color: #444;
            display: flex;
            gap: 4px;
            align-items: center;
        }

        @media (max-width: 768px) {
            .container {
                flex-direction: column;
            }

            .list-container {
                flex: 0 0 300px;
                width: 100%;
            }

            .header-content {
                flex-wrap: wrap;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="header-content">
            <a href="home.html" class="logo">✈️ Travel Explorer</a>
            <input type="text" id="searchInput" class="search-bar" placeholder="Search hotels..." />
            <div class="user-menu">
                <button onclick="performSearch()">Search</button>
                <button onclick="logout()" style="background-color: #999;">Logout</button>
            </div>
        </div>
    </header>

    <div class="container">
        <div class="map-container">
            <div id="map"></div>
        </div>

        <div class="list-container">
            <div class="hotel-list-header">
                <h2>Results</h2>
                <div class="hotel-count" id="hotelCount">Loading...</div>
            </div>
            <div id="hotelList"></div>
        </div>
    </div>

    <script>
        // Prefer same-origin on port 3000; otherwise fallback to backend:8000
        (function(){
            const origin = window.location.origin || '';
            if (!window.__API_BASE__) {
                if (origin.includes(':3000') || origin.includes(':8000')) {
                    window.__API_BASE__ = '';
                } else {
                    window.__API_BASE__ = 'http://localhost:8000';
                }
            }
        })();
    </script>
    <script type="module">
        import { searchHotels } from './services/api.js';
        let map;
        let markers = [];
        let currentHotels = [];
        let currentHotelId = null;

        document.addEventListener('DOMContentLoaded', function() {
            // Check authentication
            const userEmail = localStorage.getItem('userEmail');
            if (!userEmail) {
                window.location.href = 'signup.html';
                return;
            }

            // Initialize map
            initializeMap();

            // Get search query
            const urlParams = new URLSearchParams(window.location.search);
            const query = urlParams.get('q');

            if (query) {
                document.getElementById('searchInput').value = query;
                performSearch();
            }

            // Search on Enter
            document.getElementById('searchInput').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    performSearch();
                }
            });
        });

        function initializeMap() {
            map = L.map('map').setView([20, 78], 5);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '© OpenStreetMap contributors',
                maxZoom: 19
            }).addTo(map);
        }

        let searchAbortController = null;

        async function performSearch() {
            const query = document.getElementById('searchInput').value.trim();
            if (query.length < 2) {
                alert('Please enter at least 2 characters');
                return;
            }

            // Update URL
            window.history.pushState({}, '', `?q=${encodeURIComponent(query)}`);

            // Indicate loading state
            document.getElementById('hotelCount').textContent = 'Loading…';
            document.getElementById('hotelList').innerHTML = '<div class="loading">Loading results...</div>';

            // Abort previous in-flight request
            if (searchAbortController) {
                searchAbortController.abort();
            }
            searchAbortController = new AbortController();

            try {
                const hotels = await searchHotels(query, { signal: searchAbortController.signal });
                currentHotels = hotels;
                renderResults(hotels);
            } catch (error) {
                if (error?.name === 'AbortError') return; // ignore aborted
                console.error('Error searching hotels:', error);
                document.getElementById('hotelList').innerHTML = '<div class="loading">Error loading results</div>';
                document.getElementById('hotelCount').textContent = '0 hotels';
            }
        }

        function renderResults(hotels) {
            document.getElementById('hotelCount').textContent = `${hotels.length} hotel${hotels.length !== 1 ? 's' : ''} found`;

            // Clear previous markers
            markers.forEach(marker => map.removeLayer(marker));
            markers = [];

            if (hotels.length === 0) {
                document.getElementById('hotelList').innerHTML = '<div class="loading">No hotels found</div>';
                return;
            }

            // Add markers to map
            const bounds = L.latLngBounds();
            hotels.forEach(hotel => {
                const popupHtml = buildPopupContent(hotel);
                const marker = L.marker([hotel.latitude, hotel.longitude])
                    .addTo(map)
                    .bindPopup(popupHtml, { closeButton: true, maxWidth: 260 });

                marker.hotelId = hotel.id;
                marker.on('click', function() {
                    highlightHotel(hotel.id);
                });

                markers.push(marker);
                bounds.extend([hotel.latitude, hotel.longitude]);
            });

            // Fit map to bounds
            if (bounds.isValid()) {
                map.fitBounds(bounds, { padding: [50, 50] });
            }

            // Render list
            document.getElementById('hotelList').innerHTML = hotels.map(hotel => `
                <div class="hotel-list-item" id="listitem-${hotel.id}" onclick="highlightHotel(${hotel.id})">
                    <div class="list-hotel-name">${hotel.name}</div>
                    <div class="list-hotel-location">${hotel.city}, ${hotel.country}</div>
                    <div class="list-hotel-footer">
                        <div class="list-hotel-price">₹${(Math.round(hotel.price)).toLocaleString('en-IN')}</div>
                        <div class="list-hotel-rating">
                            <span class="star">★</span>
                            <span>${hotel.rating.toFixed(2)}</span>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function buildPopupContent(hotel) {
            const price = `₹${(Math.round(hotel.price)).toLocaleString('en-IN')}`;
            const rating = hotel.rating ? hotel.rating.toFixed(2) : 'N/A';
            const location = [hotel.city, hotel.country].filter(Boolean).join(', ');
            return `
                <a class="popup-card" href="hotel-details.html?id=${hotel.id}">
                    <img src="${hotel.image_url}" alt="${hotel.name}" loading="lazy" />
                    <div class="popup-card-body">
                        <div class="popup-card-title">${hotel.name}</div>
                        <div class="popup-card-meta">${location}</div>
                        <div class="popup-card-price">${price} / night</div>
                        <div class="popup-card-rating">★ ${rating}</div>
                    </div>
                </a>
            `;
        }

        function highlightHotel(hotelId) {
            // Remove previous highlight
            if (currentHotelId) {
                document.getElementById(`listitem-${currentHotelId}`)?.classList.remove('active');
            }

            // Highlight new hotel
            currentHotelId = hotelId;
            const listItem = document.getElementById(`listitem-${hotelId}`);
            if (listItem) {
                listItem.classList.add('active');
                listItem.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }

            // Find and open marker popup
            const hotel = currentHotels.find(h => h.id === hotelId);
            if (hotel) {
                const marker = markers.find(m => m.hotelId === hotelId);
                if (marker) {
                    marker.openPopup();
                    map.setView([hotel.latitude, hotel.longitude], 13);
                }
            }
        }

        function viewDetails(hotelId) {
            window.location.href = `hotel-details.html?id=${hotelId}`;
        }

        function logout() {
            localStorage.removeItem('userEmail');
            window.location.href = 'signup.html';
        }

        // Expose functions to global scope for onclick handlers
        window.viewDetails = viewDetails;
        window.logout = logout;
        window.highlightHotel = highlightHotel;
        window.performSearch = performSearch;
    </script>
</body>
</html>
