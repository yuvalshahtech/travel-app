<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <style>
        :root {
            --bg: #ffffff;
            --text: #1f1f1f;
            --muted: #7a7a7a;
            --border: #dcdcdc;
            --red: #d90429;
            --red-dark: #b50321;
            --success: #1c7c54;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg,#fff5f7 0%,#fdf1f3 100%);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 32px 20px;
        }

        .card {
            width: 100%;
            max-width: 530px;
            background: #fff;
            border-radius: 14px;
            box-shadow: 0 14px 40px rgba(0, 0, 0, 0.08);
            padding: 34px 40px;
            transition: transform 0.4s ease-out, box-shadow 0.4s ease-out;
        }

        .card:hover {
            transform: translateY(-6px);
            box-shadow: 
                0 24px 60px rgba(0, 0, 0, 0.12),
                0 0 80px rgba(217, 4, 41, 0.04);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
        }

        .title {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: -0.2px;
        }

        .toggle {
            display: flex;
            gap: 8px;
        }

        .toggle a {
            padding: 10px 16px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
            color: var(--red);
            background: rgba(217, 4, 41, 0.08);
            border: 1px solid rgba(217, 4, 41, 0.18);
            transition: background 0.2s ease, color 0.2s ease;
        }

        .toggle a.active {
            background: var(--red);
            color: #fff;
            border-color: var(--red);
        }

        .toggle a:hover {
            background: rgba(217, 4, 41, 0.12);
        }

        .toggle a.active:hover {
            background: var(--red-dark);
        }

        .password-wrapper {
            position: relative;
            width: 100%;
        }

        .password-wrapper input {
            padding-right: 44px; /* space for eye icon */
        }

        .toggle-password {
            position: absolute;
            top: 50%;
            right: 10px;
            transform: translateY(-50%);
            background: transparent;
            border: none;
            padding: 4px;
            cursor: pointer;
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--muted);
            border-radius: 6px;
            transition: background 0.15s ease, color 0.15s ease;
        }

        .toggle-password svg {
            width: 20px;
            height: 20px;
            stroke-width: 1.8;
        }

        .toggle-password:hover {
            color: var(--text);
            background: rgba(0, 0, 0, 0.04);
        }

        .toggle-password:active {
            background: rgba(0, 0, 0, 0.08);
        }


        .message {
            display: none;
            padding: 12px 14px;
            border-radius: 8px;
            margin-bottom: 18px;
            font-size: 14px;
            border: 1px solid transparent;
        }

        .message.error {
            color: var(--red-dark);
            background: rgba(217, 4, 41, 0.08);
            border-color: rgba(217, 4, 41, 0.16);
        }

        .message.success {
            color: var(--success);
            background: rgba(28, 124, 84, 0.08);
            border-color: rgba(28, 124, 84, 0.16);
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        label {
            font-size: 14px;
            color: var(--muted);
            font-weight: 600;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 15px;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        input:focus {
            outline: none;
            border-color: var(--red);
            box-shadow: 0 0 0 3px rgba(217, 4, 41, 0.1);
        }

        button[type="submit"] {
            width: 100%;
            padding: 14px;
            background: var(--red);
            color: #fff;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.18s ease, transform 0.15s ease;
        }

        button[type="submit"]:hover {
            background: var(--red-dark);
            transform: translateY(-1px);
        }

        button[type="submit"]:active {
            transform: translateY(0);
        }

        button[type="submit"]:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .secondary-action {
            margin-top: 14px;
            text-align: center;
            font-size: 14px;
            color: var(--muted);
        }

        .secondary-action a {
            color: var(--red);
            text-decoration: none;
            font-weight: 600;
        }

        .secondary-action a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="header">
            <div class="title">Access your account</div>
            <div class="toggle">
                <a href="login.html" class="active">Login</a>
                <a href="signup.html">Sign Up</a>
            </div>
        </div>

        <div id="message" class="message"></div>

        <form id="loginForm">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" autocomplete="email" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>

                <div class="password-wrapper">
                    <input
                        type="password"
                        id="password"
                        name="password"
                        autocomplete="current-password"
                        required
                    >

                    <button
                        type="button"
                        class="toggle-password"
                        id="togglePassword"
                        aria-label="Toggle password visibility"
                    >
                        <!-- Eye (hidden password) -->
                        <svg
                            id="eyeOpen"
                            xmlns="http://www.w3.org/2000/svg"
                            fill="none"
                            viewBox="0 0 24 24"
                            stroke="currentColor"
                        >
                            <path stroke-linecap="round" stroke-linejoin="round"
                                d="M2.458 12C3.732 7.943 7.523 5 12 5
                                c4.478 0 8.268 2.943 9.542 7
                                -1.274 4.057 -5.064 7 -9.542 7
                                -4.477 0 -8.268 -2.943 -9.542 -7z" />
                            <circle cx="12" cy="12" r="3" />
                        </svg>

                        <!-- Slash-eye (visible password) -->
                        <svg
                            id="eyeClosed"
                            xmlns="http://www.w3.org/2000/svg"
                            fill="none"
                            viewBox="0 0 24 24"
                            stroke="currentColor"
                            style="display: none;"
                        >
                            <path stroke-linecap="round" stroke-linejoin="round"
                                d="M3 3l18 18M10.73 10.73
                                a3 3 0 104.24 4.24M6.53 6.53
                                C4.5 8.1 3 10.5 2.46 12
                                c1.27 4.06 5.06 7 9.54 7
                                a9.77 9.77 0 004.47-1.02" />
                        </svg>
                    </button>
                </div>
            </div>

            <button type="submit" id="submitBtn">Login</button>
        </form>

        <div class="secondary-action">
            Need an account? <a href="signup.html">Sign Up</a>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:8000';
        const form = document.getElementById('loginForm');
        const messageDiv = document.getElementById('message');
        const submitBtn = document.getElementById('submitBtn');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');

        window.addEventListener('DOMContentLoaded', () => {
            const prefilledEmail = localStorage.getItem('prefill_email');
            if (prefilledEmail) {
                emailInput.value = prefilledEmail;
            }
        });

        function showMessage(text, type) {
            messageDiv.textContent = text;
            messageDiv.className = 'message ' + type;
            messageDiv.style.display = 'block';
        }

        function hideMessage() {
            messageDiv.style.display = 'none';
        }

        function clearPrefillData() {
            localStorage.removeItem('prefill_email');
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            hideMessage();

            const email = emailInput.value.trim();
            const password = passwordInput.value;

            if (!email || !password) {
                showMessage('Please fill in all fields.', 'error');
                return;
            }

            submitBtn.disabled = true;
            submitBtn.textContent = 'Signing in...';

            try {
                const response = await fetch(`${API_URL}/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (response.ok) {
                    showMessage('Login Successful', 'success');
                    clearPrefillData();
                    localStorage.setItem('userEmail', email);
                    setTimeout(() => {
                        window.location.href = 'home.html';
                    }, 900);
                } else {
                    showMessage(data.detail || 'Invalid email or password.', 'error');
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Login';
                }
            } catch (error) {
                console.error('Login error:', error);
                showMessage('Cannot connect to server. Please ensure the backend is running.', 'error');
                submitBtn.disabled = false;
                submitBtn.textContent = 'Login';
            }
        });
        const togglePasswordBtn = document.getElementById('togglePassword');
        const eyeOpen = document.getElementById('eyeOpen');
        const eyeClosed = document.getElementById('eyeClosed');

        togglePasswordBtn.addEventListener('click', () => {
            const isPassword = passwordInput.type === 'password';

            passwordInput.type = isPassword ? 'text' : 'password';

            eyeOpen.style.display = isPassword ? 'none' : 'block';
            eyeClosed.style.display = isPassword ? 'block' : 'none';
        });
    </script>
</body>
</html>
