<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>
    <style>
        :root {
            --bg: #ffffff;
            --text: #1f1f1f;
            --muted: #7a7a7a;
            --border: #dcdcdc;
            --red: #d90429;
            --red-dark: #b50321;
            --success: #1c7c54;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg,#fff5f7 0%,#fdf1f3 100%);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 32px 20px;
        }

        .card {
            width: 100%;
            max-width: 530px;
            background: #fff;
            border-radius: 14px;
            box-shadow: 0 14px 40px rgba(0, 0, 0, 0.08);
            padding: 34px 40px;
            transition: transform 0.4s ease-out, box-shadow 0.4s ease-out;
        }

        .card:hover {
            transform: translateY(-6px);
            box-shadow: 
                0 24px 60px rgba(0, 0, 0, 0.12),
                0 0 80px rgba(217, 4, 41, 0.04);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
        }

        .title {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: -0.2px;
        }

        .toggle {
            display: flex;
            gap: 8px;
        }

        .toggle a {
            padding: 10px 16px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
            color: var(--red);
            background: rgba(217, 4, 41, 0.08);
            border: 1px solid rgba(217, 4, 41, 0.18);
            transition: background 0.2s ease, color 0.2s ease;
        }

        .toggle a.active {
            background: var(--red);
            color: #fff;
            border-color: var(--red);
        }

        .toggle a:hover {
            background: rgba(217, 4, 41, 0.12);
        }

        .toggle a.active:hover {
            background: var(--red-dark);
        }

        .message {
            display: none;
            padding: 12px 14px;
            border-radius: 8px;
            margin-bottom: 18px;
            font-size: 14px;
            border: 1px solid transparent;
        }

        .message.error {
            color: var(--red-dark);
            background: rgba(217, 4, 41, 0.08);
            border-color: rgba(217, 4, 41, 0.16);
        }

        .message.success {
            color: var(--success);
            background: rgba(28, 124, 84, 0.08);
            border-color: rgba(28, 124, 84, 0.16);
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        label {
            font-size: 14px;
            color: var(--muted);
            font-weight: 600;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 15px;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        input:focus {
            outline: none;
            border-color: var(--red);
            box-shadow: 0 0 0 3px rgba(217, 4, 41, 0.1);
        }

        button[type="submit"] {
            width: 100%;
            padding: 14px;
            background: var(--red);
            color: #fff;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.18s ease, transform 0.15s ease;
        }

        button[type="submit"]:hover {
            background: var(--red-dark);
            transform: translateY(-1px);
        }

        button[type="submit"]:active {
            transform: translateY(0);
        }

        button[type="submit"]:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .password-wrapper {
            position: relative;
            width: 100%;
        }

        .password-wrapper input {
            padding-right: 44px; /* space for eye icon */
        }

        .toggle-password {
            position: absolute;
            top: 50%;
            right: 10px;
            transform: translateY(-50%);
            background: transparent;
            border: none;
            padding: 4px;
            cursor: pointer;
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--muted);
            border-radius: 6px;
            transition: background 0.15s ease, color 0.15s ease;
        }

        .toggle-password svg {
            width: 20px;
            height: 20px;
            stroke-width: 1.8;
        }

        .toggle-password:hover {
            color: var(--text);
            background: rgba(0, 0, 0, 0.04);
        }

        .toggle-password:active {
            background: rgba(0, 0, 0, 0.08);
        }


        .secondary-action {
            margin-top: 14px;
            text-align: center;
            font-size: 14px;
            color: var(--muted);
        }

        .secondary-action a {
            color: var(--red);
            text-decoration: none;
            font-weight: 600;
        }

        .secondary-action a:hover {
            text-decoration: underline;
        }

        .inline-link {
            color: var(--red);
            font-weight: 700;
            cursor: pointer;
            text-decoration: none;
        }

        .inline-link:hover {
            text-decoration: underline;
        }
        /* OTP form spacing improvement */
        #otpForm {
            margin-top: 12px;
        }

        #otpForm .form-group {
            margin-bottom: 12px;
        }

        #otpForm button[type="submit"] {
            margin-top: 8px;
        }
        #otpForm input {
            text-align: center;
            letter-spacing: 4px;
            font-size: 16px;
        }

    </style>
</head>
<body>
    <div class="card">
        <div class="header">
            <div class="title">Create your account</div>
            <div class="toggle">
                <a href="login.html">Login</a>
                <a href="signup.html" class="active">Sign Up</a>
            </div>
        </div>

        <div id="message" class="message"></div>

        <form id="signupForm">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" autocomplete="email" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>

                <div class="password-wrapper">
                    <input
                        type="password"
                        id="password"
                        name="password"
                        autocomplete="new-password"
                        required
                        minlength="6"
                    >

                    <button
                        type="button"
                        class="toggle-password"
                        id="togglePassword"
                        aria-label="Toggle password visibility"
                    >
                        <!-- Eye icon (SVG – Adobe-style, professional) -->
                        <svg
                            id="eyeOpen"
                            xmlns="http://www.w3.org/2000/svg"
                            fill="none"
                            viewBox="0 0 24 24"
                            stroke="currentColor"
                        >
                            <path stroke-linecap="round" stroke-linejoin="round"
                                d="M2.458 12C3.732 7.943 7.523 5 12 5
                                c4.478 0 8.268 2.943 9.542 7
                                -1.274 4.057 -5.064 7 -9.542 7
                                -4.477 0 -8.268 -2.943 -9.542 -7z" />
                            <circle cx="12" cy="12" r="3" />
                        </svg>

                        <svg
                            id="eyeClosed"
                            xmlns="http://www.w3.org/2000/svg"
                            fill="none"
                            viewBox="0 0 24 24"
                            stroke="currentColor"
                            style="display: none;"
                        >
                            <path stroke-linecap="round" stroke-linejoin="round"
                                d="M3 3l18 18M10.73 10.73
                                a3 3 0 104.24 4.24M6.53 6.53
                                C4.5 8.1 3 10.5 2.46 12
                                c1.27 4.06 5.06 7 9.54 7
                                a9.77 9.77 0 004.47-1.02" />
                        </svg>

                    </button>
                </div>
            </div>

            <button type="submit" id="submitBtn">Create Account</button>
        </form>

        <form id="otpForm" style="display: none;">
            <div class="form-group">
                <label for="otp">Enter OTP Code</label>
                <input 
                    type="text" 
                    id="otp" 
                    name="otp" 
                    placeholder="000000" 
                    maxlength="6" 
                    pattern="[0-9]{6}"
                    required
                >
            </div>
            <button type="submit" id="verifyBtn">Verify OTP</button>
        </form>

        <div class="secondary-action">
            Already have an account? <a href="login.html">Login</a>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:8000';
        const signupForm = document.getElementById('signupForm');
        const otpForm = document.getElementById('otpForm');
        const messageDiv = document.getElementById('message');
        const submitBtn = document.getElementById('submitBtn');
        const verifyBtn = document.getElementById('verifyBtn');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const otpInput = document.getElementById('otp');

        let pendingEmail = null;

        function showMessage(text, type) {
            messageDiv.innerHTML = text;
            messageDiv.className = 'message ' + type;
            messageDiv.style.display = 'block';
        }

        function hideMessage() {
            messageDiv.style.display = 'none';
        }

        function showOtpForm(email) {
            pendingEmail = email;
            signupForm.style.display = 'none';
            otpForm.style.display = 'block';
            otpInput.focus();
        }

        function goToLogin() {
            window.location.href = 'login.html';
        }

        signupForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            hideMessage();

            const email = emailInput.value.trim();
            const password = passwordInput.value;

            if (!email || !password) {
                showMessage('Please fill in all fields.', 'error');
                return;
            }

            if (password.length < 6) {
                showMessage('Password must be at least 6 characters.', 'error');
                return;
            }

            submitBtn.disabled = true;
            submitBtn.textContent = 'Sending OTP...';

            try {
                const response = await fetch(`${API_URL}/signup`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (response.ok) {
                    showMessage('OTP sent to your email. Check your inbox.', 'success');
                    showOtpForm(email);
                } else if (response.status === 409) {
                    const errorDetail = data.detail || '';
                    
                    // Case 1: OTP already sent (pending verification)
                    if (errorDetail.includes('OTP already sent')) {
                        showMessage('OTP already sent to this email. Check your inbox and enter the code.', 'error');
                        showOtpForm(email);
                    } 
                    // Case 2: Account already exists (fully created account)
                    else if (errorDetail.includes('Account already exists')) {
                        localStorage.setItem('prefill_email', email);
                        showMessage('Account already exists. <a class="inline-link" id="goLogin">Go to Login</a>', 'error');
                        const goLoginLink = document.getElementById('goLogin');
                        if (goLoginLink) {
                            goLoginLink.addEventListener('click', goToLogin);
                        }
                        setTimeout(goToLogin, 1500);
                    }
                    else {
                        // Generic 409 fallback
                        showMessage(errorDetail || 'This email is unavailable.', 'error');
                        submitBtn.disabled = false;
                        submitBtn.textContent = 'Create Account';
                    }
                } else {
                    showMessage(data.detail || 'Signup failed. Please try again.', 'error');
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Create Account';
                }
            } catch (error) {
                console.error('Signup error:', error);
                showMessage('Cannot connect to server. Please ensure the backend is running.', 'error');
                submitBtn.disabled = false;
                submitBtn.textContent = 'Create Account';
            }
        });

        otpForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            hideMessage();

            const otp = otpInput.value.trim();

            if (!otp || otp.length !== 6) {
                showMessage('OTP must be 6 digits.', 'error');
                return;
            }

            verifyBtn.disabled = true;
            verifyBtn.textContent = 'Verifying...';

            try {
                const response = await fetch(`${API_URL}/verify-otp`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ email: pendingEmail, otp })
                });

                const data = await response.json();

                if (response.ok) {
                    showMessage('Email verified! Account created. Redirecting to login...', 'success');
                    localStorage.setItem('prefill_email', pendingEmail);
                    setTimeout(goToLogin, 1500);
                } else if (response.status === 410) {
                    showMessage('OTP expired. Please sign up again.', 'error');
                    setTimeout(() => {
                        otpForm.style.display = 'none';
                        signupForm.style.display = 'block';
                        emailInput.value = '';
                        passwordInput.value = '';
                        otpInput.value = '';
                        verifyBtn.disabled = false;
                        verifyBtn.textContent = 'Verify OTP';
                        pendingEmail = null;
                    }, 1500);
                } else {
                    showMessage(data.detail || 'OTP verification failed.', 'error');
                    verifyBtn.disabled = false;
                    verifyBtn.textContent = 'Verify OTP';
                }
            } catch (error) {
                console.error('OTP verification error:', error);
                showMessage('Cannot connect to server. Please ensure the backend is running.', 'error');
                verifyBtn.disabled = false;
                verifyBtn.textContent = 'Verify OTP';
            }
        });

        const togglePasswordBtn = document.getElementById('togglePassword');
        const eyeOpen = document.getElementById('eyeOpen');
        const eyeClosed = document.getElementById('eyeClosed');

        togglePasswordBtn.addEventListener('click', () => {
            const isPassword = passwordInput.type === 'password';
            passwordInput.type = isPassword ? 'text' : 'password';
            eyeOpen.style.display = isPassword ? 'none' : 'block';
            eyeClosed.style.display = isPassword ? 'block' : 'none';
        });
    </script>
</body>
</html>
